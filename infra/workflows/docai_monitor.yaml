main:
  params: [input]
  steps:
    - init:
        assign:
          # Terraform から注入される固定値
          - project_id: ${project_id}
          - temp_bucket_name: ${temp_bucket_name}
          - jobs_collection: ${jobs_collection}
          - md_generator_topic: ${md_generator_topic}
          # ocr-trigger から実行時に渡される値
          - job_id: $${input.job_id}
          - operation_name: $${input.operation_name}
          # MD 完了待ちポーリング上限（10秒 * 120回 = 約20分）
          - md_poll_count: 0
          - md_poll_max: 120
          # temp JSON 一覧取得のページネーション用トークン
          - temp_page_token: ""

    - markRunning:
        # 監視開始時点で DocAI 実行中に更新
        call: googleapis.firestore.v1.projects.databases.documents.patch
        args:
          name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
          updateMask:
            fieldPaths: ["status"]
          body:
            fields:
              status:
                stringValue: "DOC_AI_RUNNING"

    - getOperation:
        # Document AI の Long Running Operation を取得
        call: googleapis.documentai.v1.projects.locations.operations.get
        args:
          name: $${operation_name}
        result: operation

    - normalizeOperation:
        # 欠損キーに備えて done/error を正規化
        assign:
          - operation_done: $${default(map.get(operation, "done"), false)}
          - operation_error: $${map.get(operation, "error")}

    - checkDone:
        # 未完了なら待機継続、error ありなら失敗、なければ成功へ進む
        switch:
          - condition: $${operation_done == false}
            next: waitStep
          - condition: $${operation_error != null}
            next: markDocAiFailed
        next: markDocAiSucceeded

    - waitStep:
        # DocAI完了待ち（30秒間隔）
        call: sys.sleep
        args:
          seconds: 30
        next: getOperation

    - markDocAiFailed:
        # DocAI 失敗内容を Firestore に残して終了
        call: googleapis.firestore.v1.projects.databases.documents.patch
        args:
          name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
          updateMask:
            fieldPaths: ["status", "last_error"]
          body:
            fields:
              status:
                stringValue: "DOC_AI_FAILED"
              last_error:
                stringValue: $${json.encode_to_string(operation_error)}
        next: finishFailed

    - markDocAiSucceeded:
        # DocAI 成功後、md-generator キュー投入へ遷移
        call: googleapis.firestore.v1.projects.databases.documents.patch
        args:
          name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
          updateMask:
            fieldPaths: ["status"]
          body:
            fields:
              status:
                stringValue: "DOC_AI_SUCCEEDED"
        next: publishMdJob

    - publishMdJob:
        try:
          # md-generator は Pub/Sub 経由で非同期起動する
          call: googleapis.pubsub.v1.projects.topics.publish
          args:
            topic: $${md_generator_topic}
            body:
              messages:
                - data: '$${base64.encode("{\"job_id\":\"" + job_id + "\"}")}'
                  attributes:
                    source: "docai_monitor"
                    job_id: $${job_id}
        except:
          as: publish_error
          steps:
            - logPublishError:
                # Firestore だけでなく Workflow ログにも原因を残す
                call: sys.log
                args:
                  severity: "ERROR"
                  data: $${"publishMdJob failed for job_id=" + job_id + " error=" + json.encode_to_string(publish_error)}
            - markMdQueueFailed:
                # Publish 失敗は MD_QUEUE_FAILED として記録
                call: googleapis.firestore.v1.projects.databases.documents.patch
                args:
                  name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
                  updateMask:
                    fieldPaths: ["status", "last_error"]
                  body:
                    fields:
                      status:
                        stringValue: "MD_QUEUE_FAILED"
                      last_error:
                        stringValue: $${json.encode_to_string(publish_error)}
            - finishQueueFailed:
                return: "MD_QUEUE_FAILED"
        next: markMdQueued

    - markMdQueued:
        # キュー投入済みを保存し、md-generator 側の結果待ちへ進む
        call: googleapis.firestore.v1.projects.databases.documents.patch
        args:
          name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
          updateMask:
            fieldPaths: ["status"]
          body:
            fields:
              status:
                stringValue: "MD_QUEUED"
        next: getJobAfterMd

    - getJobAfterMd:
        # md-generator が更新するジョブ状態を再取得
        call: googleapis.firestore.v1.projects.databases.documents.get
        args:
          name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
        result: job_doc

    - normalizeJobAfterMd:
        # null 安全にステータス/削除対象オブジェクト情報を取り出す
        assign:
          - job_fields: $${map.get(job_doc, "fields")}
          - status_field: $${if(job_fields == null, null, map.get(job_fields, "status"))}
          - input_bucket_field: $${if(job_fields == null, null, map.get(job_fields, "input_bucket"))}
          - input_name_field: $${if(job_fields == null, null, map.get(job_fields, "input_name"))}
          - md_status: $${default(map.get(status_field, "stringValue"), "")}
          - input_bucket: $${default(map.get(input_bucket_field, "stringValue"), "")}
          - input_name: $${default(map.get(input_name_field, "stringValue"), "")}
          - temp_json_prefix: $${input_name + "_json/"}

    - checkMdDone:
        # 成功時のみ削除処理を実行。失敗時は調査用に入力/JSONを残す
        switch:
          - condition: $${md_status == "MD_SUCCEEDED"}
            next: deleteInputObject
          - condition: $${md_status == "MD_FAILED"}
            next: finishFailed
          - condition: $${md_poll_count >= md_poll_max}
            next: finishMdTimeout
        next: waitMdStep

    - waitMdStep:
        # md-generator 完了待ち（10秒間隔）
        call: sys.sleep
        args:
          seconds: 10
        next: incrementMdPollCount

    - incrementMdPollCount:
        # 無限待機防止のためポーリング回数を加算
        assign:
          - md_poll_count: $${md_poll_count + 1}
        next: getJobAfterMd

    - deleteInputObject:
        try:
          # MD 成功後に入力PDFを削除
          call: googleapis.storage.v1.objects.delete
          args:
            bucket: $${input_bucket}
            object: $${input_name}
        except:
          as: input_delete_error
          steps:
            - recordInputDeleteError:
                # 削除失敗は処理停止せず、エラー内容のみ保存
                call: googleapis.firestore.v1.projects.databases.documents.patch
                args:
                  name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
                  updateMask:
                    fieldPaths: ["last_error"]
                  body:
                    fields:
                      last_error:
                        stringValue: $${json.encode_to_string(input_delete_error)}
        next: listTempJsonObjects

    - listTempJsonObjects:
        # DocAI 生成JSONの prefix 一覧をページ単位で取得
        call: googleapis.storage.v1.objects.list
        args:
          bucket: $${temp_bucket_name}
          prefix: $${temp_json_prefix}
          pageToken: $${temp_page_token}
        result: temp_json_list
        next: normalizeTempJsonList

    - normalizeTempJsonList:
        # items / nextPageToken を欠損安全に取り出す
        assign:
          - temp_items: $${default(map.get(temp_json_list, "items"), [])}
          - temp_page_token: $${default(map.get(temp_json_list, "nextPageToken"), "")}
        next: deleteTempJsonLoop

    - deleteTempJsonLoop:
        # temp 配下JSONを順次削除（失敗は記録して継続）
        for:
          value: item
          in: $${temp_items}
          steps:
            - deleteTempJsonObject:
                try:
                  call: googleapis.storage.v1.objects.delete
                  args:
                    bucket: $${temp_bucket_name}
                    object: $${item.name}
                except:
                  as: temp_delete_error
                  steps:
                    - recordTempDeleteError:
                        call: googleapis.firestore.v1.projects.databases.documents.patch
                        args:
                          name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
                          updateMask:
                            fieldPaths: ["last_error"]
                          body:
                            fields:
                              last_error:
                                stringValue: $${json.encode_to_string(temp_delete_error)}
        next: checkMoreTempJsonPages

    - checkMoreTempJsonPages:
        # nextPageToken があれば次ページを取得し、全件削除までループする
        switch:
          - condition: $${temp_page_token != ""}
            next: listTempJsonObjects
        next: finishOk

    - finishFailed:
        # DocAI 失敗または md-generator 失敗
        return: "FAILED"

    - finishMdTimeout:
        # md-generator 完了待ちが上限到達
        return: "MD_WAIT_TIMEOUT"

    - finishOk:
        # 正常終了（MD生成 + 後処理完了）
        return: "OK"
