main:
  params: [input]
  steps:
    - init:
        assign:
          # Terraform から注入される固定設定値
          - project_id: ${project_id}
          - temp_bucket_name: ${temp_bucket_name}
          # ocr-trigger から execution argument で渡される値
          - job_id: $${input.job_id}
          - operation_name: $${input.operation_name}
          - jobs_collection: ${jobs_collection}
          # md-generator 呼び出し先（OIDC audience も同じURI）
          - md_generator_url: ${md_generator_url}
          - md_generator_audience: ${md_generator_audience}
          # MD完了待ちのポーリング制御
          # 10秒間隔 x 120回 = 最大20分待機
          - md_poll_count: 0
          - md_poll_max: 120
          - trigger_failed: false

    - markRunning:
      # DocAIのLRO監視に入る前にジョブ状態を実行中へ更新
        call: googleapis.firestore.v1.projects.databases.documents.patch
        args:
          name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
          updateMask:
            fieldPaths: ["status"]
          body:
            fields:
              status:
                stringValue: "DOC_AI_RUNNING"

    - getOperation:
      # Document AI の Long Running Operation を取得
        call: googleapis.documentai.v1.projects.locations.operations.get
        args:
          name: $${operation_name}
        result: operation

    - normalizeOperation:
        assign:
          - operation_done: $${default(map.get(operation, "done"), false)}
          - operation_error: $${map.get(operation, "error")}

    - checkDone:
      # done=false は待機継続、errorありは失敗終了、その他は成功扱い
        switch:
          - condition: $${operation_done == false}
            next: waitStep
          - condition: $${operation_error != null}
            next: markDocAiFailed
        next: markDocAiSucceeded

    - waitStep:
      # DocAI完了待ち（30秒間隔）
        call: sys.sleep
        args:
          seconds: 30
        next: getOperation

    - markDocAiFailed:
      # DocAI失敗内容をFirestoreに記録して終了
        call: googleapis.firestore.v1.projects.databases.documents.patch
        args:
          name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
          updateMask:
            fieldPaths: ["status", "last_error"]
          body:
            fields:
              status:
                stringValue: "DOC_AI_FAILED"
              last_error:
                stringValue: $${json.encode_to_string(operation_error)}
        next: finishFailed

    - markDocAiSucceeded:
      # DocAI成功を記録したら md-generator 起動へ進む
        call: googleapis.firestore.v1.projects.databases.documents.patch
        args:
          name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
          updateMask:
            fieldPaths: ["status"]
          body:
            fields:
              status:
                stringValue: "DOC_AI_SUCCEEDED"
        next: triggerMdGenerator

    - triggerMdGenerator:
      # md-generator は非同期で進むため、後続でFirestoreを監視する。
      # HTTP 500 などが返っても即時失敗せず、ジョブ状態を見に行く。
        try:
          call: http.post
          args:
            url: $${md_generator_url}
            auth:
              type: OIDC
              audience: $${md_generator_audience}
            headers:
              Content-Type: "application/json"
            body:
              job_id: $${job_id}
          result: md_response
        except:
          as: trigger_error
          steps:
            - setTriggerFailed:
                assign:
                  - trigger_failed: true
            - recordMdTriggerHttpError:
                call: googleapis.firestore.v1.projects.databases.documents.patch
                args:
                  name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
                  updateMask:
                    fieldPaths: ["last_error"]
                  body:
                    fields:
                      last_error:
                        stringValue: $${json.encode_to_string(trigger_error)}
        next: checkTriggerResult

    - checkTriggerResult:
      # HTTPエラー時はステータス上書きせず、実ジョブ状態をポーリングで確認する。
        switch:
          - condition: $${trigger_failed}
            next: getJobAfterMd
        next: markMdTriggered

    - markMdTriggered:
      # 発火済みステータスを保存（運用時の可視化用）
        call: googleapis.firestore.v1.projects.databases.documents.patch
        args:
          name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
          updateMask:
            fieldPaths: ["status"]
          body:
            fields:
              status:
                stringValue: "MD_TRIGGERED"
        next: getJobAfterMd

    - getJobAfterMd:
      # md-generator が更新するジョブ状態を取得
        call: googleapis.firestore.v1.projects.databases.documents.get
        args:
          name: $${"projects/" + project_id + "/databases/(default)/documents/" + jobs_collection + "/" + job_id}
        result: job_doc

    - normalizeJobAfterMd:
        assign:
          - job_fields: $${map.get(job_doc, "fields")}
          - status_field: $${if(job_fields == null, null, map.get(job_fields, "status"))}
          - input_bucket_field: $${if(job_fields == null, null, map.get(job_fields, "input_bucket"))}
          - input_name_field: $${if(job_fields == null, null, map.get(job_fields, "input_name"))}
          # md-generator 側が最終的に MD_SUCCEEDED / MD_FAILED を設定
          - md_status: $${default(map.get(status_field, "stringValue"), "")}
          # 削除対象（入力PDF）の場所
          - input_bucket: $${default(map.get(input_bucket_field, "stringValue"), "")}
          - input_name: $${default(map.get(input_name_field, "stringValue"), "")}
          # DocAI JSON の保存先プレフィックス（ocr-trigger の命名規約に合わせる）
          - temp_json_prefix: $${input_name + "_json/"}

    - checkMdDone:
      # MD成功時のみクリーンアップを実行する。
      # 失敗時は再調査・再実行のために入力/JSONを残す。
        switch:
          - condition: $${md_status == "MD_SUCCEEDED"}
            next: deleteInputObject
          - condition: $${md_status == "MD_FAILED"}
            next: finishFailed
          - condition: $${md_poll_count >= md_poll_max}
            next: finishMdTimeout
        next: waitMdStep

    - waitMdStep:
      # md-generator 完了待ち（10秒間隔）
        call: sys.sleep
        args:
          seconds: 10
        next: incrementMdPollCount

    - incrementMdPollCount:
        # 無限待機を防ぐためカウンタを進める
        assign:
          - md_poll_count: $${md_poll_count + 1}
        next: getJobAfterMd

    - deleteInputObject:
      # Markdown作成後に入力PDFを削除
        call: googleapis.storage.v1.objects.delete
        args:
          bucket: $${input_bucket}
          object: $${input_name}
        next: listTempJsonObjects

    - listTempJsonObjects:
      # DocAI出力JSONを prefix 一覧取得して順次削除
        call: googleapis.storage.v1.objects.list
        args:
          bucket: $${temp_bucket_name}
          prefix: $${temp_json_prefix}
        result: temp_json_list
        next: deleteTempJsonLoop

    - deleteTempJsonLoop:
        for:
          value: item
          in: $${default(map.get(temp_json_list, "items"), [])}
          steps:
            - deleteTempJsonObject:
                # temp配下の各JSONオブジェクトを削除
                call: googleapis.storage.v1.objects.delete
                args:
                  bucket: $${temp_bucket_name}
                  object: $${item.name}
        next: finishOk

    - finishFailed:
        return: "DOC_AI_FAILED"

    - finishMdTimeout:
        # md-generator の完了待ちが上限に達した場合
        return: "MD_WAIT_TIMEOUT"

    - finishOk:
        return: "OK"
